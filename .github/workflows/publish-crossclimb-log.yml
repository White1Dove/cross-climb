name: Publish Daily Puzzle Log

on:
  repository_dispatch:
    types:
      - crossclimb_log
      - pinpoint_log
      - daily_puzzle_log
  workflow_dispatch:
    inputs:
      log_json:
        description: Raw Crossclimb or Pinpoint log JSON for manual testing.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-daily-puzzle-log
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write log payload
        env:
          DISPATCH_LOG_JSON: ${{ toJson(github.event.client_payload.log) }}
          MANUAL_LOG_JSON: ${{ inputs.log_json }}
        run: |
          if [ -n "$MANUAL_LOG_JSON" ]; then
            printf '%s' "$MANUAL_LOG_JSON" > /tmp/daily-puzzle-log.json
          else
            printf '%s' "$DISPATCH_LOG_JSON" > /tmp/daily-puzzle-log.json
          fi
          node -e "JSON.parse(require('fs').readFileSync('/tmp/daily-puzzle-log.json', 'utf8'))"

      - name: Import log
        run: pnpm import:puzzle-log /tmp/daily-puzzle-log.json

      - name: Build
        run: pnpm run build

      - name: Commit content data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current-crossclimb.json data/crossclimb-history.json data/current-pinpoint.json data/pinpoint-history.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes to publish."
            exit 0
          fi
          git commit -m "Update daily puzzle data"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.changed == 'true'
        run: npx wrangler@4.94.0 pages deploy out --project-name=puzzle-clues-today --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
